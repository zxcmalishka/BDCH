	<!-- CINEMATIC BLUR REVEAL SCRIPT V4 -->
	<script>
		(function () {
			// Target all major blocks: cards, headers, text, forms, footer sections
			const targetSelectors = '#portfolio .grid > div, section:nth-of-type(3) .grid > div, h2, h3, h4, p, form, .bg-card, footer > div';

			const observer = new IntersectionObserver((entries) => {
				entries.forEach(entry => {
					if (entry.isIntersecting) {
						// Slight delay to ensure React has fully painted
						setTimeout(() => {
							entry.target.setAttribute('data-scroll-reveal', 'visible');
						}, 50);
						observer.unobserve(entry.target);
					}
				});
			}, { root: null, rootMargin: '0px 0px -50px 0px', threshold: 0.1 });

			// Constantly scan for new elements (React hydration safe)
			setInterval(() => {
				const elements = document.querySelectorAll(targetSelectors);

				elements.forEach(el => {
					// Ignore hero elements
					if (el.closest('section:first-of-type')) return;

					if (!el.hasAttribute('data-scroll-reveal')) {
						const rect = el.getBoundingClientRect();
						// If it's way above the screen, show it instantly
						if (rect.top < 0) {
							el.setAttribute('data-scroll-reveal', 'visible');
						} else {
							// Otherwise, hide it and watch it
							el.setAttribute('data-scroll-reveal', 'hidden');
							observer.observe(el);
						}
					}
				});
			}, 300);
		})();
	</script>

	<!-- TELEGRAM DIRECT FORM HANDLER (works without backend) -->
	<script>
		(function () {
			const TG_TOKEN = '8774209392:AAFOKbPxn41O2gQ9ikKsntWrTIDxX08L424';
			const TG_CHAT_ID = '1159139747';

			function sendToTelegram(data) {
				var msg = '🔔 <b>Новая заявка с сайта BDCH!</b>\n\n' +
					'👤 <b>Имя:</b> ' + (data.name || '—') + '\n' +
					'📧 <b>Email:</b> ' + (data.email || '—') + '\n' +
					'📱 <b>Телефон:</b> ' + (data.phone || '—') + '\n' +
					'🏢 <b>Компания:</b> ' + (data.company || 'Не указана');

				return fetch('https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: 'HTML' })
				});
			}

			function showToast(success) {
				var toast = document.createElement('div');
				toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:99999;padding:16px 28px;border-radius:12px;font-family:Inter,sans-serif;font-size:15px;font-weight:600;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.4);transition:opacity 0.5s;opacity:1;';
				if (success) {
					toast.style.background = 'linear-gradient(135deg,#1a7a4a,#22c55e)';
					toast.textContent = '✅ Заявка отправлена! Свяжемся в течение 24 часов.';
				} else {
					toast.style.background = 'linear-gradient(135deg,#7a1a1a,#ef4444)';
					toast.textContent = '❌ Ошибка отправки. Свяжитесь с нами в Telegram.';
				}
				document.body.appendChild(toast);
				setTimeout(function () { toast.style.opacity = '0'; }, 3500);
				setTimeout(function () { toast.remove(); }, 4000);
			}

			// DOM-level form intercept (works without any backend)
			document.addEventListener('submit', function (e) {
				var form = e.target;
				// Only intercept the lead/contact form (has name, email, phone fields)
				var nameEl = form.querySelector('input[name="name"]');
				var emailEl = form.querySelector('input[name="email"]');
				var phoneEl = form.querySelector('input[name="phone"]');

				if (!nameEl || !emailEl || !phoneEl) return; // not our form

				e.preventDefault();
				e.stopPropagation();

				var btn = form.querySelector('button[type="submit"]');
				if (btn) { btn.disabled = true; btn.textContent = 'Отправка...'; }

				var data = {
					name: nameEl.value,
					email: emailEl.value,
					phone: phoneEl.value,
					company: (form.querySelector('input[name="company"]') || {}).value || ''
				};

				// Basic validation
				if (!data.name.trim() || !data.email.trim() || !data.phone.trim()) {
					showToast(false);
					if (btn) { btn.disabled = false; btn.textContent = 'Отправить заявку'; }
					return;
				}

				sendToTelegram(data)
					.then(function (r) { return r.json(); })
					.then(function (r) {
						if (r.ok) {
							showToast(true);
							form.reset();
							if (btn) { btn.textContent = 'Спасибо!'; }
						} else {
							showToast(false);
							if (btn) { btn.disabled = false; btn.textContent = 'Отправить заявку'; }
						}
					})
					.catch(function () {
						showToast(false);
						if (btn) { btn.disabled = false; btn.textContent = 'Отправить заявку'; }
					});
			}, true); // true = capture phase, fires before React
		})();
	</script>
